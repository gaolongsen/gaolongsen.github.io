---
title: "Resource"
layout: default
description: Record my traveling around the world
header-img: "img/tag-bg.jpg"
---
<!-- Page Header -->
<header class="intro-header" style="background-image: url('{{ site.baseurl }}/{% if page.header-img %}{{ page.header-img }}{% else %}{{ site.header-img }}{% endif %}')">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
                <div class="site-heading" id="tag-heading">
                    <h1>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</h1>
                    <span class="subheading">{{ page.description }}</span>
                </div>
            </div>
        </div>
    </div>
</header>
<!DOCTYPE html>
<html>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: Arial;
  margin: 0;
}

* {
  box-sizing: border-box;
}

img {
  vertical-align: middle;
}

/* Position the image container (needed to position the left and right arrows) */
.container {
  position: relative;
}

/* Hide the images by default */
.mySlides {
  display: none;
}

/* Add a pointer when hovering over the thumbnail images */
.cursor {
  cursor: pointer;
}

/* Next & previous buttons */
.prev,
.next {
  cursor: pointer;
  position: absolute;
  top: 40%;
  width: auto;
  padding: 16px;
  margin-top: -50px;
  color: white;
  font-weight: bold;
  font-size: 20px;
  border-radius: 0 3px 3px 0;
  user-select: none;
  -webkit-user-select: none;
}

/* Position the "next button" to the right */
.next {
  right: 0;
  border-radius: 3px 0 0 3px;
}

/* On hover, add a black background color with a little bit see-through */
.prev:hover,
.next:hover {
  background-color: rgba(0, 0, 0, 0.8);
}

/* Number text (1/3 etc) */
.numbertext {
  color: #f2f2f2;
  font-size: 12px;
  padding: 8px 12px;
  position: absolute;
  top: 0;
}

/* Container for image text */
.caption-container {
  text-align: center;
  background-color: #222;
  padding: 2px 16px;
  color: white;
}

.row:after {
  content: "";
  display: table;
  clear: both;
}

/* Six columns side by side */
.column {
  float: left;
  width: 16.66%;
}

/* Add a transparency effect for thumnbail images */
.demo {
  opacity: 0.6;
}

.active,
.demo:hover {
  opacity: 1;
}
</style>
<body>

<h2 style="text-align:center">Slideshow Gallery</h2>

<div class="container">
  <div class="My travelling">
    <div class="numbertext">1 / 6</div>
    <img src="https://dynaimage.cdn.cnn.com/cnn/q_auto,w_1100,c_fill,g_auto,h_619,ar_16:9/http%3A%2F%2Fcdn.cnn.com%2Fcnnnext%2Fdam%2Fassets%2F201230100452-10-2021-travel-destinations-hawaii.jpg" style="width:100%">
  </div>

  <div class="My travelling">
    <div class="numbertext">2 / 6</div>
    <img src="https://www.planetware.com/wpimages/2020/01/ecuador-in-pictures-beautiful-places-to-photograph-quito.jpg" style="width:100%">
  </div>

  <div class="My travelling">
    <div class="numbertext">3 / 6</div>
    <img src="https://3iqhm91wtiv21y4zza4dqwj2-wpengine.netdna-ssl.com/wp-content/uploads/Ecuador-Guayaquil-Santa-Ana-Hill-Lighthouse-1440x960.jpg" style="width:100%">
  </div>
    
  <div class="My travelling">
    <div class="numbertext">4 / 6</div>
    <img src="https://galapagos-pro.com/wp-content/uploads/2019/06/5MIV1400-1030x687.jpg" style="width:100%">
  </div>

  <div class="My travelling">
    <div class="numbertext">5 / 6</div>
    <img src="https://img.huffingtonpost.com/asset/60a4c4141e0000697e102081.jpeg?cache=6JtZOCmSHJ&ops=scalefit_720_noupscale&format=webp" style="width:100%">
  </div>
    
  <div class="My travelling">
    <div class="numbertext">6 / 6</div>
    <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/01/24/57/9a/caption.jpg?w=2400&h=-1&s=1" style="width:100%">
  </div>
    
  <a class="prev" onclick="plusSlides(-1)">❮</a>
  <a class="next" onclick="plusSlides(1)">❯</a>

  <div class="caption-container">
    <p id="caption"></p>
  </div>

  <div class="row">
    <div class="column">
      <img class="demo cursor" src="" style="width:100%" onclick="currentSlide(1)" alt="Cambodia">
    </div>
    <div class="column">
      <img class="demo cursor" src="" style="width:100%" onclick="currentSlide(2)" alt="South Korea">
    </div>
    <div class="column">
      <img class="demo cursor" src="" alt="South Korea">
    </div>
    <div class="column">
      <img class="demo cursor" src="" alt="Mexico">
    </div>
    <div class="column">
      <img class="demo cursor" src="" style="width:100%" onclick="currentSlide(5)" alt="Mexico">
    </div>    
    <div class="column">
      <img class="demo cursor" src="" style="width:100%" onclick="currentSlide(6)" alt="Malaysia ">
    </div>
  </div>
</div>

<script>
var slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n) {
  showSlides(slideIndex += n);
}

function currentSlide(n) {
  showSlides(slideIndex = n);
}

function showSlides(n) {
  var i;
  var slides = document.getElementsByClassName("mySlides");
  var dots = document.getElementsByClassName("demo");
  var captionText = document.getElementById("caption");
  if (n > slides.length) {slideIndex = 1}
  if (n < 1) {slideIndex = slides.length}
  for (i = 0; i < slides.length; i++) {
      slides[i].style.display = "none";
  }
  for (i = 0; i < dots.length; i++) {
      dots[i].className = dots[i].className.replace(" active", "");
  }
  slides[slideIndex-1].style.display = "block";
  dots[slideIndex-1].className += " active";
  captionText.innerHTML = dots[slideIndex-1].alt;
}
</script>
    
</body>
</html>
